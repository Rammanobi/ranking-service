<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ranking Service</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Ranking Service</h1>
    <nav>
      <a href="docs.html">Docs</a>
    </nav>
    <div class="api-base-row">
      <label for="apiBase">API</label>
      <input id="apiBase" type="text" value="http://localhost:8010" />
      <button id="saveApiBase">Save</button>
      <span id="healthDot" class="dot" title="API health"></span>
    </div>
  </header>

  <main>
    <section class="card">
      <h2>Submit Transaction</h2>
      <form id="txForm">
        <label>User ID
          <input id="txUserId" type="text" placeholder="alice" required />
        </label>
        <label>Amount
          <input id="txAmount" type="number" step="0.01" min="0.01" placeholder="50" required />
        </label>
        <label>Idempotency Key
          <input id="txKey" type="text" placeholder="auto-generated if left blank" />
        </label>
        <button type="submit">Submit</button>
      </form>
      <pre id="txResult" class="result"></pre>
    </section>

    <section class="card">
      <h2>User Summary</h2>
      <form id="summaryForm">
        <label>User ID
          <input id="summaryUserId" type="text" placeholder="alice" required />
        </label>
        <button type="submit">Lookup</button>
      </form>
      <pre id="summaryResult" class="result"></pre>
    </section>

    <section class="card wide">
      <h2>Ranking <button id="refreshRanking" class="link-btn">refresh</button></h2>
      <table id="rankingTable">
        <thead>
          <tr>
            <th>#</th>
            <th>User</th>
            <th>Total Points</th>
            <th>Active Days</th>
            <th>Ranking Score</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
